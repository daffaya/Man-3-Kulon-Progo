name: Deploy Vite to cPanel (FTP Safe)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy safely to public_html
        run: |
          lftp -e "
          set ssl:verify-certificate no;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }};

          mirror -R dist /public_html \
            --only-newer \
            --no-perms \
            --exclude-glob .htaccess \
            --ignore-time;

          bye
          "
