name: Deploy Vite Frontend to cPanel (FTP Safe)

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # INSTALL DI FRONTEND (PENTING)
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      # BUILD DI FRONTEND (PENTING)
      - name: Build Vite app
        working-directory: frontend
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      # DEPLOY DARI frontend/dist
      - name: Deploy to FTP (safe mode)
        run: |
          lftp -e "
          set ssl:verify-certificate no;
          open ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_HOST }}:${{ secrets.FTP_PORT }};
          mirror -R --delete --no-perms --exclude-glob .htaccess \
            frontend/dist /public_html;
          put frontend/dist/index.html -o /public_html/index.html;
          bye
          "
