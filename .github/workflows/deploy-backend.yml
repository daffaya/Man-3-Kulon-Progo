name: Sync Backend Branch

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Deploy backend folder to backend branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git checkout --orphan temp-backend
          git rm -rf .
          git checkout main -- backend/
          mv backend/* .
          mv backend/.* . 2>/dev/null || true
          rmdir backend
          git add .
          git commit -m "sync: backend from main"
          git push origin temp-backend:backend --force
